name: Deploy Appwrite Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy Appwrite Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Appwrite CLI
        uses: appwrite/setup-for-appwrite@v2
        with:
          method: key
          key: ${{ secrets.APPWRITE_API_KEY }}
          project: ${{ secrets.APPWRITE_PROJECT_ID }}
          endpoint: ${{ secrets.APPWRITE_ENDPOINT }}

      - name: Push Functions
        run: appwrite push functions --all --force --activate true
