name: Deploy Appwrite Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy Appwrite Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Push Functions
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          appwrite client --endpoint "${{ secrets.APPWRITE_ENDPOINT }}"
          appwrite client --project-id "${{ secrets.APPWRITE_PROJECT_ID }}"
          appwrite client --key "${{ secrets.APPWRITE_API_KEY }}"
          appwrite push functions --all --force --activate true
