name: fitkarma
description: "FitKarma — Offline-first Indian health & fitness tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# ─── Runtime Dependencies ─────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # ── State & Navigation ───────────────────────────────────────────────────────
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3

  # ── Local Database (Drift + SQLCipher) ───────────────────────────────────────
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  sqlcipher_flutter_libs: ^0.7.0+eol

  # ── Appwrite Sync ─────────────────────────────────────────────────────────────
  appwrite: ^24.0.0
  connectivity_plus: ^7.1.1

  # ── UI & Animation ────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.8

  # ── Health ────────────────────────────────────────────────────────────────────
  health: ^13.3.1

  # ── Auth & Security ───────────────────────────────────────────────────────────
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.1.0
  pointycastle: ^4.0.0
  flutter_windowmanager: ^0.2.0

  # ── Food / Barcode ────────────────────────────────────────────────────────────
  mobile_scanner: ^7.2.0
  dio: ^5.4.3+1

  # ── Monetisation ─────────────────────────────────────────────────────────────
  purchases_flutter: ^10.0.2

  # ── Notifications ─────────────────────────────────────────────────────────────
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # ── Observability ─────────────────────────────────────────────────────────────
  sentry_flutter: ^8.6.0

  # ── Misc Utilities ────────────────────────────────────────────────────────────
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.3
  intl: ^0.20.2
  workmanager: ^0.9.0+3
  home_widget: ^0.7.0
  uuid: ^4.4.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  sqlite3: any

# ─── Dev Dependencies ─────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code Generation ───────────────────────────────────────────────────────────
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0

  # ── Testing ────────────────────────────────────────────────────────────────────
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter

# ─── Flutter ──────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/fonts/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.ttf
        - asset: assets/fonts/OpenDyslexic-Bold.ttf
          weight: 700

    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
