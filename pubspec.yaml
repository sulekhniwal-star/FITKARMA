name: fitkarma
description: "FitKarma — Offline-first Indian health & fitness tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

# ─── Runtime Dependencies ─────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # ── State & Navigation ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # ── Local Database (Drift + SQLCipher) ───────────────────────────────────────
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  sqlcipher_flutter_libs: ^0.5.4

  # ── Appwrite Sync ─────────────────────────────────────────────────────────────
  appwrite: ^13.0.0
  connectivity_plus: ^6.0.3

  # ── UI & Animation ────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8

  # ── Health ────────────────────────────────────────────────────────────────────
  health: ^11.1.0

  # ── Auth & Security ───────────────────────────────────────────────────────────
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  pointycastle: ^3.9.1

  # ── Food / Barcode ────────────────────────────────────────────────────────────
  mobile_scanner: ^5.2.3
  dio: ^5.4.3+1

  # ── Monetisation ─────────────────────────────────────────────────────────────
  purchases_flutter: ^7.8.0

  # ── Notifications ─────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # ── Observability ─────────────────────────────────────────────────────────────
  sentry_flutter: ^8.6.0

  # ── Misc Utilities ────────────────────────────────────────────────────────────
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  path_provider: ^2.1.3
  intl: ^0.19.0

# ─── Dev Dependencies ─────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code Generation ───────────────────────────────────────────────────────────
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

  # ── Testing ────────────────────────────────────────────────────────────────────
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter

# ─── Flutter ──────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/fonts/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.ttf
        - asset: assets/fonts/OpenDyslexic-Bold.ttf
          weight: 700
