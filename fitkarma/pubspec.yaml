name: fitkarma
description: "FitKarma - Indian Health & Fitness Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Storage
  hive_flutter: ^1.1.0
  
  # Backend
  appwrite: ^22.0.0
  
  # Networking
  dio: ^5.4.0
  http: ^1.1.0
  
  # Navigation
  go_router: ^17.1.0
  
  # Security
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1
  
  # Connectivity
  connectivity_plus: ^7.0.0
  
  # Location & Maps
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  
  # Video
  youtube_player_flutter: ^9.1.3
  
  # ML/AI
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_object_detection: ^0.15.1
  
  # Barcode & Speech
  mobile_scanner: ^7.2.0
  speech_to_text: ^7.3.0
  
  # Health Platforms
  pedometer: ^4.0.1
  
  # Charts & UI
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^21.0.0
  
  # Payments
  razorpay_flutter: ^1.3.7
  
  # Analytics & Crash Reporting
  firebase_messaging: ^16.1.2
  sentry_flutter: ^9.14.0
  
  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  
  # Environment Variables
  flutter_dotenv: ^6.0.0
  
  # PDF Generation
  pdf: ^3.10.0
  
  # Rich Text Editor
  flutter_quill: ^11.5.0
  
  # Audio
  just_audio: ^0.10.5
  
  # Background Tasks
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  
  # Testing
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - .env
